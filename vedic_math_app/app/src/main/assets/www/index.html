<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>WLAN Cracker · fh_ style</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* LIGHT THEME (default) */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-page: #f5f5f5;
      --card-bg: #ffffff;
      --card-shadow: 0 15px 30px rgba(0, 0, 0, 0.05), 0 3px 8px rgba(0,0,0,0.02);
      --text-primary: #111111;
      --label-text: #222222;
      --input-border: #d0d9e5;
      --input-placeholder: #a8b6c9;
      --input-bg: #ffffff;
      --input-text: #111111;
      --generate-bg: #111111;
      --generate-text: white;
      --generate-hover: #2a2a2a;
      --clear-bg: #e9ecf0;
      --clear-border: #cbd5e1;
      --clear-text: #1e2b3c;
      --clear-hover: #dadfe8;
      --output-bg: #f0f4fa;
      --output-border: #e2e9f2;
      --output-label: #2b4a6f;
      --output-text: #0f2c42;
      --copy-btn-bg: #d4e0f0;
      --copy-btn-color: #1e3a5f;
    }

    /* DARK THEME */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page: #121212;
        --card-bg: #1e1e1e;
        --card-shadow: 0 15px 30px rgba(0, 0, 0, 0.7), 0 3px 8px rgba(0,0,0,0.5);
        --text-primary: #eaeef2;
        --label-text: #b8c7dd;
        --input-border: #3f4d60;
        --input-placeholder: #7a8b9f;
        --input-bg: #2a2f38;
        --input-text: #eef3f8;
        --generate-bg: #4a6fa5;
        --generate-text: white;
        --generate-hover: #5f82b9;
        --clear-bg: #2f3b4a;
        --clear-border: #4b5e77;
        --clear-text: #d1e0f0;
        --clear-hover: #3f4f63;
        --output-bg: #1e2a36;
        --output-border: #384b60;
        --output-label: #9bbad8;
        --output-text: #d4e5ff;
        --copy-btn-bg: #2f4055;
        --copy-btn-color: #c0d8f0;
      }
    }

    body {
      background: var(--bg-page);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 12px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 32px;
      box-shadow: var(--card-shadow);
      width: 100%;
      max-width: 500px;
      padding: 28px 22px;
      transition: background 0.2s, box-shadow 0.2s;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 22px;
    }

    .field-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--label-text);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 8px;
    }

    .wlan-input {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.1rem;
      border: 1.8px solid var(--input-border);
      border-radius: 20px;
      outline: none;
      background: var(--input-bg);
      color: var(--input-text);
      margin-bottom: 24px;
      -webkit-appearance: none;
    }

    .wlan-input:focus {
      border-color: var(--text-primary);
    }

    .wlan-input::placeholder {
      color: var(--input-placeholder);
    }

    .button-row {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .generate-btn {
      background: var(--generate-bg);
      color: var(--generate-text);
      border: none;
      border-radius: 50px;
      padding: 18px 16px;
      font-size: 1.3rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      flex: 2;
      min-width: 180px;
      cursor: pointer;
      transition: background 0.2s, transform 0.05s;
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
    }

    .generate-btn:hover {
      background: var(--generate-hover);
    }

    .generate-btn:active {
      transform: scale(0.97);
    }

    .clear-btn {
      background: var(--clear-bg);
      color: var(--clear-text);
      border: 1.5px solid var(--clear-border);
      border-radius: 50px;
      padding: 18px 16px;
      font-size: 1.3rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      flex: 1;
      min-width: 110px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
    }

    .clear-btn:hover {
      background: var(--clear-hover);
    }

    .clear-btn:active {
      transform: scale(0.96);
    }

    /* output area with copy button */
    .output-block {
      background: var(--output-bg);
      border-radius: 28px;
      padding: 18px 22px;
      border: 1px solid var(--output-border);
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .output-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--output-label);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .copy-btn {
      background: var(--copy-btn-bg);
      color: var(--copy-btn-color);
      border: none;
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
    }

    .copy-btn:active {
      transform: scale(0.94);
      opacity: 0.8;
    }

    .copy-btn.hidden {
      display: none;
    }

    #result {
      font-size: 2.2rem;
      font-weight: 700;
      word-break: break-all;
      color: var(--output-text);
      line-height: 1.3;
      min-height: 4rem;
    }

    #result:empty::before {
      content: "";
    }

    /* mobile fine-tuning */
    @media (max-width: 480px) {
      .card { padding: 22px 18px; }
      h1 { font-size: 1.9rem; }
      .generate-btn { font-size: 1.1rem; padding: 16px 10px; min-width: 140px; }
      .clear-btn { font-size: 1.1rem; padding: 16px 10px; min-width: 90px; }
      .output-block { padding: 16px 18px; }
      #result { font-size: 1.9rem; }
    }

    @media (max-width: 360px) {
      .button-row { flex-direction: column; }
      .generate-btn, .clear-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>WLAN Cracker</h1>
    <div class="field-label">ENTER WLAN NAME WITHOUT "fh_"</div>
    <input type="text" class="wlan-input" id="wlanInput" placeholder="e.g. 1ea298" spellcheck="false" autofocus>

    <div class="button-row">
      <button class="generate-btn" id="generateBtn">GENERATE</button>
      <button class="clear-btn" id="clearBtn">CLEAR</button>
    </div>

    <div class="output-block">
      <div class="output-header">
        <span class="output-label">PASSWORD</span>
        <button class="copy-btn" id="copyBtn">📋 COPY</button>
      </div>
      <div id="result"></div>
    </div>
  </div>

  <script>
    (function() {
      const inputEl = document.getElementById('wlanInput');
      const generateBtn = document.getElementById('generateBtn');
      const clearBtn = document.getElementById('clearBtn');
      const copyBtn = document.getElementById('copyBtn');
      const resultEl = document.getElementById('result');

      // Original transformation (exact)
      function transformRaw(original) {
        let r = original
          .replace(/a/g, "A").replace(/5/g, "a").replace(/A/g, "5")
          .replace(/b/g, "B").replace(/4/g, "b").replace(/B/g, "4")
          .replace(/c/g, "C").replace(/3/g, "c").replace(/C/g, "3")
          .replace(/d/g, "D").replace(/2/g, "d").replace(/D/g, "2")
          .replace(/e/g, "E").replace(/1/g, "e").replace(/E/g, "1")
          .replace(/f/g, "F").replace(/0/g, "f").replace(/F/g, "0")
          .replace(/8/g, "H").replace(/7/g, "8").replace(/H/g, "7")
          .replace(/6/g, "I").replace(/9/g, "6").replace(/I/g, "9");
        return "wlan" + r;
      }

      function showGenerated() {
        const raw = inputEl.value;
        const full = transformRaw(raw);
        resultEl.textContent = full;
        // show copy button only when there's content
        copyBtn.classList.toggle('hidden', full === 'wlan' || full === '');
      }

      function clearAll() {
        inputEl.value = '';
        resultEl.textContent = '';
        copyBtn.classList.add('hidden');
        inputEl.focus();
      }

      // Copy to clipboard
      async function copyPassword() {
        const text = resultEl.textContent;
        if (!text || text === 'wlan') return;
        try {
          await navigator.clipboard.writeText(text);
          // Visual feedback
          const originalText = copyBtn.textContent;
          copyBtn.textContent = 'COPIED!';
          setTimeout(() => {
            copyBtn.textContent = originalText;
          }, 800);
        } catch (err) {
          alert('Copy failed');
        }
      }

      // Initial state
      resultEl.textContent = '';
      copyBtn.classList.add('hidden');

      // Event listeners
      generateBtn.addEventListener('click', (e) => {
        e.preventDefault();
        showGenerated();
      });

      clearBtn.addEventListener('click', (e) => {
        e.preventDefault();
        clearAll();
      });

      inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          showGenerated();
        }
      });

      inputEl.addEventListener('input', () => {
        resultEl.textContent = '';
        copyBtn.classList.add('hidden');
      });

      copyBtn.addEventListener('click', copyPassword);
    })();
  </script>
</body>
</html>
