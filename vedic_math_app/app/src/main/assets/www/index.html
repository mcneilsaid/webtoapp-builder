<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>WLAN Cracker · deep material</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #e0e5ec;  /* medium grey background */
      font-family: 'Roboto', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.2), 0 5px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 460px;
      padding: 32px 24px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 500;
      color: #121926;
      margin-bottom: 32px;
      letter-spacing: -0.01em;
    }

    /* Material Outlined Text Field */
    .text-field {
      margin-bottom: 40px;
    }

    .text-field input {
      width: 100%;
      padding: 16px 18px;
      font-size: 1.1rem;
      border: 2px solid #b0c0d0;
      border-radius: 18px;
      outline: none;
      background: #ffffff;
      color: #121926;
      font-family: 'Roboto', sans-serif;
      transition: border 0.15s, box-shadow 0.15s;
    }

    .text-field input:focus {
      border-color: #1e3b5c;
      box-shadow: 0 0 0 4px rgba(30,59,92,0.15);
    }

    .text-field input::placeholder {
      color: #6f7e95;
      font-weight: 400;
      font-size: 1rem;
      opacity: 1;
    }

    .button-row {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
    }

    /* Filled button – dark */
    .btn-filled {
      background: #1e2b3c;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 16px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex: 1;
      cursor: pointer;
      box-shadow: 0 8px 18px -6px #1e2b3c80;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    }

    .btn-filled:hover {
      background: #253649;
      box-shadow: 0 10px 22px -6px #1e2b3c;
    }

    .btn-filled:active {
      transform: scale(0.97);
      background: #17212e;
    }

    /* Outlined button – dark border */
    .btn-outlined {
      background: transparent;
      color: #1e2b3c;
      border: 2px solid #9eb0c8;
      border-radius: 40px;
      padding: 14px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex: 1;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }

    .btn-outlined:hover {
      background: #edf2f9;
      border-color: #1e2b3c;
    }

    .btn-outlined:active {
      transform: scale(0.97);
      background: #dce5f0;
    }

    /* Output card – grey background, not white */
    .output-card {
      background: #f0f4fa;   /* light grey, not white */
      border-radius: 24px;
      padding: 18px 24px 20px 24px;
      box-shadow: inset 0 1px 4px rgba(255,255,255,0.8), 0 4px 12px rgba(0,0,0,0.05);
      border: 1px solid #d0ddee;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    .copy-btn {
      background: transparent;
      border: none;
      color: #1e3b5c;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 6px 16px;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .copy-btn:hover {
      background: rgba(30,59,92,0.08);
    }

    .copy-btn:active {
      background: rgba(30,59,92,0.15);
    }

    .copy-btn.hidden {
      display: none;
    }

    #result {
      font-size: 2rem;
      font-weight: 500;
      word-break: break-all;
      color: #0f1a28;
      line-height: 1.4;
      min-height: 4rem;
      font-family: 'Roboto Mono', 'Fira Code', monospace;
    }

    #result:empty::before {
      content: "";
    }

    @media (max-width: 420px) {
      .card { padding: 24px 18px; }
      h1 { font-size: 1.8rem; margin-bottom: 28px; }
      .text-field { margin-bottom: 32px; }
      .text-field input { font-size: 1rem; padding: 14px 16px; }
      .btn-filled, .btn-outlined { font-size: 1rem; padding: 14px 16px; }
      .output-card { padding: 16px 18px; }
      #result { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>WLAN Cracker</h1>

    <div class="text-field">
      <input type="text" id="wlanInput" placeholder="enter name without fh_" spellcheck="false" autofocus>
    </div>

    <div class="button-row">
      <button class="btn-filled" id="generateBtn">generate</button>
      <button class="btn-outlined" id="clearBtn">clear</button>
    </div>

    <div class="output-card">
      <div class="output-header">
        <button class="copy-btn" id="copyBtn">copy</button>
      </div>
      <div id="result"></div>
    </div>
  </div>

  <script>
    (function() {
      const inputEl = document.getElementById('wlanInput');
      const generateBtn = document.getElementById('generateBtn');
      const clearBtn = document.getElementById('clearBtn');
      const copyBtn = document.getElementById('copyBtn');
      const resultEl = document.getElementById('result');

      function transformRaw(original) {
        let r = original
          .replace(/a/g, "A").replace(/5/g, "a").replace(/A/g, "5")
          .replace(/b/g, "B").replace(/4/g, "b").replace(/B/g, "4")
          .replace(/c/g, "C").replace(/3/g, "c").replace(/C/g, "3")
          .replace(/d/g, "D").replace(/2/g, "d").replace(/D/g, "2")
          .replace(/e/g, "E").replace(/1/g, "e").replace(/E/g, "1")
          .replace(/f/g, "F").replace(/0/g, "f").replace(/F/g, "0")
          .replace(/8/g, "H").replace(/7/g, "8").replace(/H/g, "7")
          .replace(/6/g, "I").replace(/9/g, "6").replace(/I/g, "9");
        return "wlan" + r;
      }

      function showGenerated() {
        const raw = inputEl.value;
        const full = transformRaw(raw);
        resultEl.textContent = full;
        copyBtn.classList.toggle('hidden', full === 'wlan' || full === '');
      }

      function clearAll() {
        inputEl.value = '';
        resultEl.textContent = '';
        copyBtn.classList.add('hidden');
        inputEl.focus();
      }

      async function copyPassword() {
        const text = resultEl.textContent;
        if (!text || text === 'wlan') return;
        try {
          await navigator.clipboard.writeText(text);
          const originalText = copyBtn.textContent;
          copyBtn.textContent = 'copied!';
          setTimeout(() => {
            copyBtn.textContent = originalText;
          }, 800);
        } catch (err) {
          alert('copy failed');
        }
      }

      resultEl.textContent = '';
      copyBtn.classList.add('hidden');

      generateBtn.addEventListener('click', (e) => {
        e.preventDefault();
        showGenerated();
      });

      clearBtn.addEventListener('click', (e) => {
        e.preventDefault();
        clearAll();
      });

      inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          showGenerated();
        }
      });

      inputEl.addEventListener('input', () => {
        resultEl.textContent = '';
        copyBtn.classList.add('hidden');
      });

      copyBtn.addEventListener('click', copyPassword);
    })();
  </script>
</body>
</html>
